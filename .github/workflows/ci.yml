name: NullBank CI/CD

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - producao
      - production

env:
  JAVA_VERSION: '21'
  IMAGE_NAME: nullbank

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      (
        github.event.pull_request.head.ref == 'staging' ||
        startsWith(github.event.pull_request.head.ref, 'hotfix')
      )
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup do Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Resolver dependencias
        run: mvn dependency:resolve

      - name: Buildar o sistema
        run: mvn clean compile

      - name: Quality - analise estatica com SpotBugs
        run: mvn spotbugs:spotbugs

      - name: Executar testes unitarios
        run: mvn test

      - name: Gerar pacote JAR
        run: mvn package -DskipTests

      - name: Gerar pacote ZIP do sistema
        run: |
          mkdir -p dist
          cp target/*.jar dist/
          cp Dockerfile README.md pom.xml dist/
          zip -r nullbank-${{ github.run_number }}.zip dist

      - name: Disponibilizar pacote como artefato
        uses: actions/upload-artifact@v4
        with:
          name: nullbank-package
          path: nullbank-${{ github.run_number }}.zip

      - name: Calcular nova tag rel
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          source_branch="${{ github.event.pull_request.head.ref }}"
          latest_tag="$(git tag -l 'rel-*' | sed 's/^rel-//' | sort -V | tail -n 1)"

          if [[ "$source_branch" == hotfix* ]]; then
            if [[ -z "$latest_tag" ]]; then
              new_tag="rel-1.0.1"
            else
              IFS='.' read -r major minor patch <<< "$latest_tag"
              patch="${patch:-0}"
              new_tag="rel-${major}.${minor}.$((patch + 1))"
            fi
          else
            if [[ -z "$latest_tag" ]]; then
              new_tag="rel-1.0"
            else
              IFS='.' read -r major minor patch <<< "$latest_tag"
              new_tag="rel-${major}.$((minor + 1))"
            fi
          fi

          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "Nova tag: $new_tag"

      - name: Criar tag de release
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Gerar e publicar imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
